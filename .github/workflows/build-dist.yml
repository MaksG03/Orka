name: Build & Package Orka

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux DEB
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxfixes-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            xdotool \
            nodejs npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Webview UI
        run: |
          cd src/ui/webapp
          npm install
          npm run build

      - name: Build and Package
        run: |
          chmod +x scripts/*.sh
          ./scripts/build_linux_deb.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: orka-linux-deb
          path: build/*.deb

  build-windows:
    name: Build Windows MSIX
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build and Package MSIX
        shell: pwsh
        run: .\scripts\build_windows_ms_store.ps1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: orka-windows-msix
          path: build/*.msix

  # ── GitHub Release (only on tags) ────────────────────
  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Orka ${{ github.ref_name }}"
          body: |
            ## Orka ${{ github.ref_name }}

            **Конвертер розкладки клавіатури** · Perepelytsia Orka Technologies

            ### Встановлення
            - **Windows**: завантажте `.msix`, встановіть
            - **Linux**: завантажте `.deb`, встановіть `sudo dpkg -i orka_*.deb`

            ### Використання
            1. Виділіть текст у будь-якому додатку
            2. Натисніть **Alt+Z**
            3. Текст автоматично конвертується

            ### Підтримувані розкладки
            🇺🇦 Українська ↔ 🇬🇧 Англійська
            🇰🇷 Корейська ↔ 🇬🇧 Англійська
            🇮🇱 Іврит ↔ 🇬🇧 Англійська

          files: |
            artifacts/orka-linux-deb/*.deb
            artifacts/orka-windows-msix/*.msix
          draft: false
          prerelease: false
